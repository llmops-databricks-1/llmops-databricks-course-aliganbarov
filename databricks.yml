bundle:
  name: llmops-databricks-course-aliganbarov

include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"

artifacts:
  default:
    type: whl
    build: uv build
    path: .

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-296366fd-eb96.cloud.databricks.com/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  acc:
    workspace:
      host: https://dbc-296366fd-eb96.cloud.databricks.com/
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}

  prod:
    workspace:
      host: https://dbc-296366fd-eb96.cloud.databricks.com/
      root_path: /Shared/.bundle/${bundle.name}/${bundle.target}
