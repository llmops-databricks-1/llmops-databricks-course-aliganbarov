resources:
  jobs:
    process_data_job:
      name: process-data
      tags:
        project_name: "llmops-databricks-course-aliganbarov"

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - ../dist/*.whl

      tasks:
        - task_key: process_data
          environment_key: default
          notebook_task:
            notebook_path: deployment_scripts/process_data.py
            base_parameters:
              env: ${bundle.target}
              git_sha: "${var.git_sha}"
              run_id: "{{job.run_id}}"
